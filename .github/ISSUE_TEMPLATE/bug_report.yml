name: Bug Report
description: Something is broken or behaving incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Fill in every section. Incomplete reports will be closed.

  - type: dropdown
    id: layer
    attributes:
      label: Affected Layer
      options:
        - ESP32 Firmware
        - CAN / Motor Communication
        - Kinematics / Control (Python)
        - Simulation (MuJoCo)
        - PC ↔ ESP32 Communication
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Exact steps, commands, or hardware state needed to reproduce.
      placeholder: |
        1. Flash firmware with `pio run -t upload`
        2. Run `python scripts/motor_test.py --id 1`
        3. Observe error: ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste relevant serial output, Python tracebacks, or CAN traces.
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, PlatformIO version, ESP32 board
      placeholder: "Windows 11, Python 3.11, PlatformIO 6.x, ESP32-S3"
    validations:
      required: true
