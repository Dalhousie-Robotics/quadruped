; Dal Robotics Quadruped, STM32 Firmware
; PlatformIO configuration
;
; Default board: Nucleo F446RE (STM32F446RET6)
; Change [env] board if using a different STM32.
; Common alternatives:
;   nucleo_f407vg  (STM32F407)
;   nucleo_g431rb  (STM32G431, has FDCAN)
;   bluepill_f103c8 (Blue Pill, limited CAN)

[env:nucleo_f446re]
platform  = ststm32
board     = nucleo_f446re
framework = arduino

; Serial monitor baud rate (USB Serial / ST-Link Virtual COM)
monitor_speed = 115200

; Upload via ST-Link (on-board on Nucleo)
upload_protocol = stlink

; Libraries
lib_deps =
    stm32duino/STM32duino CAN @ ^1.0.0

; Build flags
build_flags =
    -DCAN_BAUD_RATE=1000000
    -DSERIAL_USB

; Unit test environment (native, no hardware needed)
[env:native]
platform = native
test_framework = unity
