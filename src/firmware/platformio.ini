; Dal Robotics Quadruped, ESP32 Firmware
; PlatformIO configuration

[env:esp32-s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Serial monitor baud rate
monitor_speed = 115200

; Upload speed
upload_speed = 921600

; Libraries
lib_deps =
    ; Add external libraries here, e.g.:
    ; ArduinoJson @ ^7.0.0

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCAN_BAUD_RATE=1000000

; Unit test environment
[env:native]
platform = native
test_framework = unity
